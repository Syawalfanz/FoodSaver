<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — FoodSaver</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">🌿 FoodSaver</a>
    <button class="hamburger" id="hamburger" aria-expanded="false"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="nav-links">
      <li><a href="browse.html">Browse</a></li>
      <li><a href="register.html" class="btn btn-primary">Join Free</a></li>
      <li><a href="cart.html" class="btn btn-ghost nav-cart">🛒 <span class="cart-badge" style="display:none;">0</span></a></li>
    </ul>
  </div>
</nav>

<div class="page-hero"><div class="container"><div class="eyebrow" style="color:var(--lime);">Welcome Back</div><h1>Login to FoodSaver</h1><p>Continue your journey toward zero food waste</p></div></div>

<div class="form-page">
  <div class="container">
    <div class="form-card">
      <div class="alert alert-success">🔒 Secured by Firebase Authentication</div>
      <form id="login-form">
        <div class="form-group"><label>Email Address *</label><input type="email" required placeholder="you@email.com" autocomplete="email"></div>
        <div class="form-group"><label>Password *</label><input type="password" required placeholder="••••••••" autocomplete="current-password"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
          <label style="display:flex;gap:8px;font-size:13px;color:var(--text-muted);cursor:pointer;align-items:center;"><input type="checkbox"> Remember me</label>
          <a href="#" onclick="showToast('Password reset email sent!');return false;" style="font-size:13px;color:var(--green-mid);font-weight:600;">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login →</button>
      </form>
      <div style="margin:20px 0;text-align:center;position:relative;">
        <hr style="border-color:var(--border);">
        <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:0 10px;font-size:12px;color:var(--text-muted);">or</span>
      </div>
      <button onclick="window.location.href='dashboard.html'" class="btn btn-outline" style="width:100%;justify-content:center;">🔵 Continue with Google (Demo)</button>
      <div class="form-alt">Don't have an account? <a href="register.html">Sign up free →</a></div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
</body></html>
