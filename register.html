<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register — FoodSaver</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">🌿 FoodSaver</a>
    <button class="hamburger" id="hamburger" aria-expanded="false"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="nav-links"><li><a href="login.html" class="btn btn-outline">Login</a></li></ul>
  </div>
</nav>

<div class="page-hero"><div class="container"><div class="eyebrow" style="color:var(--lime);">Get Started</div><h1>Create Your Account</h1><p>Join thousands of Malaysians saving food and money</p></div></div>

<div class="form-page">
  <div class="container">
    <div class="form-card" style="max-width:520px;">
      <h3 style="font-family:var(--font-display);font-size:15px;margin-bottom:14px;color:var(--green-dark);">I want to join as:</h3>
      <div class="role-picker">
        <div><input type="radio" name="role" id="role-buyer" value="buyer" class="role-option" checked><label for="role-buyer" class="role-label"><span>🛒</span>Buyer</label></div>
        <div><input type="radio" name="role" id="role-seller" value="seller" class="role-option"><label for="role-seller" class="role-label"><span>🍽️</span>Seller</label></div>
      </div>
      <form id="register-form">
        <div class="form-group"><label>Full Name *</label><input type="text" required placeholder="Ahmad bin Ali"></div>
        <div class="form-group"><label>Email Address *</label><input type="email" required placeholder="you@email.com"></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" placeholder="+60 12-345 6789"></div>
        <div class="form-group"><label>Password *</label><input type="password" required placeholder="Min 8 characters" minlength="8"></div>
        <div class="form-group"><label>State</label>
          <select>
            <option value="">Select state...</option>
            <option>Johor</option><option>Kuala Lumpur</option><option>Penang</option>
            <option>Selangor</option><option>Melaka</option><option>Other</option>
          </select>
        </div>
        <div style="margin-bottom:20px;font-size:13px;color:var(--text-muted);">
          <label style="display:flex;gap:8px;cursor:pointer;align-items:start;"><input type="checkbox" required style="margin-top:2px;"> I agree to the <a href="#" style="color:var(--green-mid);">Terms of Service</a> and <a href="#" style="color:var(--green-mid);">Privacy Policy</a></label>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account →</button>
      </form>
      <div class="form-alt">Already have an account? <a href="login.html">Login →</a></div>
    </div>
  </div>
</div>
<script src="js/main.js"></script>
</body></html>
